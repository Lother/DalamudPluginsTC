name: Mirror plugin releases

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirror releases and refresh repo.json
        env:
          GH_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: python3 scripts/mirror_releases.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json scripts/release-state.json
          git diff --cached --quiet || git commit -m "Mirror plugin releases"
          git push
